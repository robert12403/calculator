<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
</head>

<body>
    <div id="calculator">
        <div id="screen">0</div>
        <div id="containerButtons">
            <div class="row">
                <button class="buttonWide" id="undo">Undo</button>
                <button class="buttonWide" id="clear">Clear</button>
            </div>
            <div class="row">
                <button class="button buttonNum" data-val="7">7</button>
                <button class="button buttonNum" data-val="8">8</button>
                <button class="button buttonNum" data-val="9">9</button>
                <button class="button" id="divide">/</button>
            </div>
            <div class="row">
                <button class="button buttonNum" data-val="4">4</button>
                <button class="button buttonNum" data-val="5">5</button>
                <button class="button buttonNum" data-val="6">6</button>
                <button class="button" id="multiply">*</button>
            </div>
            <div class="row">
                <button class="button buttonNum" data-val="1">1</button>
                <button class="button buttonNum" data-val="2">2</button>
                <button class="button buttonNum" data-val="3">3</button>
                <button class="button" id="substract">-</button>
            </div>
            <div class="row">
                <button class="button buttonNum" data-val="0">0</button>
                <button class="button" id="dot">.</button>
                <button class="button" id="equal">=</button>
                <button class="button" id="add">+</button>
            </div>
        </div>
    </div>
</body>

</html>
